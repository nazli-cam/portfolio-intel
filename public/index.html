<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gizli Oylama</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }
  .container { max-width: 700px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 24px; }
  h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; }
  .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 20px; }
  input[type=number] { border: 1px solid #ccc; border-radius: 8px; padding: 8px 12px; font-size: 1rem; width: 120px; }
  button { cursor: pointer; border: none; border-radius: 8px; padding: 10px 20px; font-size: .95rem; font-weight: 600; transition: opacity .15s; }
  button:hover { opacity: .85; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-danger { background: #dc2626; color: #fff; }
  .btn-secondary { background: #e5e7eb; color: #222; }
  .btn-sm { padding: 6px 14px; font-size: .85rem; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: .78rem; font-weight: 600; }
  .badge-ok { background: #dcfce7; color: #166534; }
  .badge-waiting { background: #fef9c3; color: #854d0e; }
  .badge-closed { background: #fee2e2; color: #991b1b; }
  table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  th { text-align: left; padding: 8px 10px; border-bottom: 2px solid #e5e7eb; color: #666; font-weight: 600; }
  td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; word-break: break-all; }
  .link-url { font-family: monospace; font-size: .82rem; color: #2563eb; }
  .status-bar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .candidate-btn { display: block; width: 100%; text-align: left; padding: 14px 18px; border: 2px solid #e5e7eb; border-radius: 10px; background: #fff; font-size: 1rem; cursor: pointer; margin-bottom: 10px; transition: border-color .15s, background .15s; }
  .candidate-btn:hover { border-color: #2563eb; background: #eff6ff; }
  .candidate-btn.selected { border-color: #2563eb; background: #eff6ff; font-weight: 700; }
  .bar-row { margin-bottom: 14px; }
  .bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: .92rem; }
  .bar-track { background: #e5e7eb; border-radius: 99px; height: 18px; overflow: hidden; }
  .bar-fill { height: 100%; background: #2563eb; border-radius: 99px; transition: width .6s; }
  .locked { text-align: center; padding: 40px 0; color: #888; }
  .locked .lock-icon { font-size: 3rem; margin-bottom: 12px; }
  .success { text-align: center; padding: 40px 0; }
  .success .check { font-size: 3.5rem; margin-bottom: 12px; }
  .error-msg { color: #dc2626; margin-top: 8px; font-size: .9rem; }
  .hidden { display: none; }
  #app { }
  .copy-btn-row { margin-top: 10px; }
  .step-indicator { color: #888; font-size: .88rem; margin-bottom: 8px; }
  .warning { background: #fef9c3; border: 1px solid #fbbf24; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: .9rem; }
</style>
</head>
<body>
<div id="app" class="container"></div>
<script>
const CANDIDATES = ['Begüm', 'Rıza', 'Gilda', 'Erk', 'Ecem'];

function render(html) {
  document.getElementById('app').innerHTML = html;
}

function route() {
  const hash = location.hash || '#';
  if (hash.startsWith('#vote-')) {
    const linkId = hash.slice(6);
    showVotePage(linkId);
  } else if (hash === '#results') {
    showResultsPage();
  } else {
    showAdminPage();
  }
}

window.addEventListener('hashchange', route);
window.addEventListener('load', route);

// ─── ADMIN ──────────────────────────────────────────────────────────────────

async function showAdminPage() {
  render(`
    <h1>🗳 Yönetici Paneli</h1>
    <div class="card">
      <h2>Linkler Oluştur</h2>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <input type="number" id="countInput" min="1" max="500" placeholder="Kaç kişi?" value="10">
        <button class="btn-primary" onclick="generateLinks()">Linkler oluştur</button>
      </div>
      <div id="genError" class="error-msg"></div>
    </div>
    <div class="card" id="statusCard">
      <div id="statusContent">Yükleniyor…</div>
    </div>
    <div class="card" id="linksCard" class="hidden">
      <div id="linksContent"></div>
    </div>
    <div class="card">
      <h2>Tehlikeli Bölge</h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-danger" onclick="closeVoting()">Anketi kapat</button>
        <button class="btn-secondary" onclick="resetAll()">Sıfırla</button>
      </div>
    </div>
  `);
  await loadAdminStatus();
  await loadLinks();
}

async function loadAdminStatus() {
  try {
    const r = await fetch('/api/admin/status');
    const d = await r.json();
    const el = document.getElementById('statusContent');
    if (!el) return;
    el.innerHTML = `
      <h2>Durum</h2>
      <div class="status-bar">
        <span>Toplam: <strong>${d.totalLinks}</strong></span>
        <span>Kullanılan: <strong>${d.usedLinks}</strong></span>
        <span>Bekleyen: <strong>${d.totalLinks - d.usedLinks}</strong></span>
        ${d.closed ? '<span class="badge badge-closed">KAPALI</span>' : '<span class="badge badge-ok">AÇIK</span>'}
      </div>
      <a href="#results" style="font-size:.9rem;color:#2563eb">Sonuç sayfasına git →</a>
    `;
  } catch(e) {}
}

async function loadLinks() {
  try {
    const r = await fetch('/api/admin/links');
    const d = await r.json();
    const el = document.getElementById('linksContent');
    if (!el || !d.links || d.links.length === 0) {
      if (el) el.innerHTML = '<p style="color:#888;font-size:.9rem">Henüz link oluşturulmadı.</p>';
      return;
    }
    const baseUrl = location.origin;
    const rows = d.links.map(l => {
      const url = `${baseUrl}/#vote-${l.id}`;
      const badge = l.used
        ? '<span class="badge badge-ok">Kullanıldı</span>'
        : '<span class="badge badge-waiting">Bekliyor</span>';
      return `<tr>
        <td>${l.label}</td>
        <td><span class="link-url">${url}</span></td>
        <td>${badge}</td>
      </tr>`;
    }).join('');

    const allUrls = d.links.map(l => `${l.label}: ${baseUrl}/#vote-${l.id}`).join('\n');

    el.innerHTML = `
      <h2>Linkler (${d.links.length})</h2>
      <div class="copy-btn-row">
        <button class="btn-secondary btn-sm" onclick="copyAll(${JSON.stringify(allUrls).replace(/"/g,'&quot;')})">Tümünü kopyala</button>
      </div>
      <div style="overflow-x:auto;margin-top:12px">
        <table>
          <thead><tr><th>Katılımcı</th><th>Link</th><th>Durum</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  } catch(e) {}
}

async function generateLinks() {
  const count = parseInt(document.getElementById('countInput').value, 10);
  const errEl = document.getElementById('genError');
  errEl.textContent = '';
  if (!count || count < 1) { errEl.textContent = 'Geçerli bir sayı girin.'; return; }
  try {
    const r = await fetch('/api/admin/generate-links', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ count })
    });
    const d = await r.json();
    if (!r.ok) { errEl.textContent = d.error || 'Hata oluştu.'; return; }
    await loadAdminStatus();
    await loadLinks();
  } catch(e) { errEl.textContent = 'Sunucu hatası.'; }
}

async function closeVoting() {
  if (!confirm('Anketi kapatmak istediğinizden emin misiniz? Bu işlem geri alınamaz.')) return;
  await fetch('/api/admin/close', { method: 'POST' });
  await loadAdminStatus();
}

async function resetAll() {
  if (!confirm('Tüm veriler silinecek. Emin misiniz?')) return;
  await fetch('/api/admin/reset', { method: 'POST' });
  await showAdminPage();
}

function copyAll(text) {
  navigator.clipboard.writeText(text).then(() => alert('Tüm linkler kopyalandı!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    alert('Tüm linkler kopyalandı!');
  });
}

// ─── VOTE PAGE ───────────────────────────────────────────────────────────────

async function showVotePage(linkId) {
  render('<div class="card"><p>Yükleniyor…</p></div>');
  try {
    const r = await fetch(`/api/vote/${linkId}`);
    const d = await r.json();

    if (d.closed) {
      render(`<div class="card"><h1>Anket Sona Erdi</h1><p style="margin-top:12px;color:#666">Bu anket artık kapalıdır. Katılımınız için teşekkürler.</p></div>`);
      return;
    }
    if (!d.valid) {
      render(`<div class="card"><h1>Geçersiz Link</h1><p style="margin-top:12px;color:#dc2626">Bu link geçerli değil veya bulunamadı.</p></div>`);
      return;
    }
    if (d.used) {
      render(`<div class="card"><h1>Link Kullanıldı</h1><p style="margin-top:12px;color:#666">Bu link daha önce kullanılmıştır. Her link yalnızca bir kez kullanılabilir.</p></div>`);
      return;
    }
    renderVoteStep1(linkId);
  } catch(e) {
    render('<div class="card"><p class="error-msg">Sunucu hatası, lütfen tekrar deneyin.</p></div>');
  }
}

function renderVoteStep1(linkId) {
  const buttons = CANDIDATES.map((c, i) =>
    `<button class="candidate-btn" data-idx="${i}" onclick="selectQ1(${i},'${linkId}')">${c}</button>`
  ).join('');
  render(`
    <h1>Oy Kullan</h1>
    <div class="card">
      <div class="step-indicator">Adım 1 / 2</div>
      <h2>Birinci tercihiniz kim?</h2>
      <p style="margin-bottom:16px;color:#666;font-size:.9rem">Listeden bir aday seçin.</p>
      ${buttons}
    </div>
  `);
}

let voteQ1 = null;

function selectQ1(idx, linkId) {
  voteQ1 = idx;
  const remaining = CANDIDATES.map((c, i) => ({ c, i })).filter(x => x.i !== idx);
  const buttons = remaining.map(({ c, i }) =>
    `<button class="candidate-btn" data-idx="${i}" onclick="submitVote(${i},'${linkId}')">${c}</button>`
  ).join('');
  render(`
    <h1>Oy Kullan</h1>
    <div class="card" style="margin-bottom:12px">
      <div class="step-indicator">Adım 2 / 2</div>
      <h2>İkinci tercihiniz kim?</h2>
      <p style="margin-bottom:16px;color:#666;font-size:.9rem">Birinci tercihiniz: <strong>${CANDIDATES[idx]}</strong>. Kalan adaylardan birini seçin.</p>
      ${buttons}
    </div>
    <button class="btn-secondary btn-sm" onclick="showVotePage('${linkId}')">← Geri</button>
  `);
}

async function submitVote(q2, linkId) {
  try {
    const r = await fetch(`/api/vote/${linkId}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ q1: voteQ1, q2 })
    });
    const d = await r.json();
    if (r.ok && d.ok) {
      render(`
        <div class="card success">
          <div class="check">✅</div>
          <h1>Oyunuz Alındı</h1>
          <p style="margin-top:12px;color:#666">Katılımınız için teşekkürler!</p>
        </div>
      `);
    } else {
      render(`<div class="card"><p class="error-msg">${d.error || 'Bir hata oluştu.'}</p></div>`);
    }
  } catch(e) {
    render('<div class="card"><p class="error-msg">Sunucu hatası, lütfen tekrar deneyin.</p></div>');
  }
}

// ─── RESULTS PAGE ────────────────────────────────────────────────────────────

async function showResultsPage() {
  render('<div class="card"><p>Yükleniyor…</p></div>');
  try {
    const r = await fetch('/api/results/public');
    const d = await r.json();

    if (d.locked) {
      render(`
        <div class="card locked">
          <div class="lock-icon">🔒</div>
          <h1>Sonuçlar Henüz Açıklanmadı</h1>
          <p style="margin-top:12px;color:#888">Anket devam ediyor. Sonuçlar anket kapandıktan sonra görüntülenebilir.</p>
        </div>
      `);
      return;
    }

    const q1Bars = CANDIDATES.map((c, i) => buildBar(c, d.q1[i], d.total)).join('');
    const q2Bars = CANDIDATES.map((c, i) => buildBar(c, d.q2[i], d.total)).join('');

    render(`
      <h1>Sonuçlar</h1>
      <div class="card" style="margin-bottom:12px">
        <p style="color:#666;font-size:.9rem">Toplam katılımcı: <strong>${d.total}</strong></p>
      </div>
      <div class="card">
        <h2>Soru 1 — Birinci Tercih</h2>
        <div style="margin-top:16px">${q1Bars}</div>
      </div>
      <div class="card">
        <h2>Soru 2 — İkinci Tercih</h2>
        <div style="margin-top:16px">${q2Bars}</div>
      </div>
    `);
  } catch(e) {
    render('<div class="card"><p class="error-msg">Sunucu hatası.</p></div>');
  }
}

function buildBar(label, count, total) {
  const pct = total > 0 ? Math.round((count / total) * 100) : 0;
  return `
    <div class="bar-row">
      <div class="bar-label">
        <span>${label}</span>
        <span>${count} oy &nbsp;(${pct}%)</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>
  `;
}
</script>
</body>
</html>
