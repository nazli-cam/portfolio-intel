version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Bind-mount the specific file, not the directory.
      # Mounting the dir causes SQLite locking issues on some Docker versions.
      - ./data/portfolio.db:/app/portfolio.db
    environment:
      - DATABASE_URL=sqlite:////app/portfolio.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Vite bundle at build time.
        # nginx proxies /api/* → backend:8000/* so no CORS needed.
        VITE_API_URL: /api
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
