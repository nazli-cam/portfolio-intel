name: CI

on:
  push:
    branches: [main, claude/fervent-pascal-zXJgN]
  pull_request:
    branches: [main]

jobs:
  # ── Backend lint ─────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Lint
        run: ruff check backend/app --select E,F,W,I
        # E/F/W = pycodestyle + pyflakes, I = isort

  # ── Backend tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: ci-test-secret-not-for-production
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: python -m pytest tests/ -x -q
        # -x: stop on first failure  -q: quiet output
        # Tests live in backend/tests/ — add test files there as the suite grows.
        # CI passes if the directory is empty (pytest exits 0 with "no tests ran").
        continue-on-error: false

      - name: Cleanup test DB
        if: always()
        run: rm -f test.db

  # ── Frontend build ───────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend build (vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci   # respects lockfile exactly

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api
